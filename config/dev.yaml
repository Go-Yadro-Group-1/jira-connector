jira:
  baseUrl: "https://issues.apache.org/jira"
  token: ""
  maxResults: 50
  minRetryDelay: 1000
  maxRetryDelay: 60000
  rateLimitPerSec: 25.0    

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "jira_connector"

app:
  logLevel: "info"

# Prometheus metrics endpoint (/metrics). Scrape target for Prometheus.
metrics:
  enabled: true
  addr: ":9090"

# net/http/pprof profiling endpoint (/debug/pprof/).
pprof:
  enabled: false
  addr: ":6060"
